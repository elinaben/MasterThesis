project:
  type: book

book:
  title: "Regulation of MAPT (Tau) Translation in Basal Forebrain Axons"
  author: "Elina Nemtsov"
  date: today
  output-file: "Elina_Master_Thesis"
  chapters:
    - index.qmd
    - 00-copyright.qmd
    - 01-abstract.qmd
    - 02-acknowledgements.qmd
    - 10-introduction.qmd
    - 30-results.qmd
    - 20-methods.qmd
    - 40-discussion.qmd
    - 50-conclusion.qmd
    - references.qmd

bibliography: bib/references.bib
link-citations: true

format:
  pdf:
    pdf-engine: xelatex
    toc: true
    lof: true
    lot: true
    number-sections: false
    number-offset: -1
    keep-tex: true
    fontsize: 12pt
    mainfont: "Times New Roman"
    linestretch: 2
    geometry:
      - left=1.5in
      - right=1in
      - top=1in
      - bottom=1in
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \usepackage{etoolbox}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[R]{\thepage}
        \renewcommand{\headrulewidth}{0pt}
        \renewcommand{\footrulewidth}{0pt}
        \fancypagestyle{plain}{%
          \fancyhf{}%
          \fancyfoot[C]{\thepage}%
          \renewcommand{\headrulewidth}{0pt}%
          \renewcommand{\footrulewidth}{0pt}%
        }
        \renewcommand{\maketitle}{}
  docx:
    toc: true
  html:
    toc: true

execute:
  echo: false
  message: false
  warning: false

knitr:
  opts_chunk:
    fig.path: "figures/"
    fig.align: "center"
    out.width: "80%"
    dpi: 300
